# Scheduled fetch + summarize + Supabase upsert (Gistprism v2).
# Loads sources from Supabase via --from-db; LLM instructions come from categories (not sources.json / instructions.md).
#
# Repository secrets (Settings → Secrets and variables → Actions):
#   GROQ_API_KEY
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
# Optional repository variable: GROQ_MODEL (omit to use the app default)
#
# Optional secret: THESTAR_COOKIES_JSON — browser-exported cookie JSON array for
# thestar.com; written to cookies/thestar.com.json before the run. Omit if unused.

name: News manager

on:
  schedule:
    # Every 3 hours at :00 UTC (0, 3, 6, 9, 12, 15, 18, 21)
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Write The Star subscriber cookies (optional)
        env:
          COOKIE_JSON: ${{ secrets.THESTAR_COOKIES_JSON }}
        run: |
          mkdir -p cookies
          if [ -n "$COOKIE_JSON" ]; then
            python -c 'import os, pathlib; pathlib.Path("cookies/thestar.com.json").write_text(os.environ["COOKIE_JSON"], encoding="utf-8")'
            echo "Wrote cookies/thestar.com.json"
          else
            echo "THESTAR_COOKIES_JSON not set; skipping cookie file."
          fi

      - name: Install dependencies
        run: pip install -e "."

      - name: Run pipeline (Supabase required)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Optional: set repository variable GROQ_MODEL (Settings → Variables) to override model
          GROQ_MODEL: ${{ vars.GROQ_MODEL }}
        run: news-manager --from-db -v
