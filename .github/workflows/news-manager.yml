# Scheduled fetch + summarize + Supabase upsert.
# Repository secrets (Settings → Secrets and variables → Actions):
#   GROQ_API_KEY
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY
# Optional repository variable: GROQ_MODEL (omit to use the app default)

name: News manager

on:
  schedule:
    # Every 3 hours at :00 UTC (0, 3, 6, 9, 12, 15, 18, 21)
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[supabase]"

      - name: Run pipeline and sync to Supabase
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Optional: set repository variable GROQ_MODEL (Settings → Variables) to override model
          GROQ_MODEL: ${{ vars.GROQ_MODEL }}
        run: python -m news_manager --write-supabase --sources sources.json --instructions instructions.md -v
